<div class="container mt-5" style="max-width: 450px;">

    <h2 class="mb-4">Login</h2>

    <form [formGroup]="form" (ngSubmit)="login()">

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                class="form-control"
                formControlName="email">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                class="form-control"
                formControlName="password">

        </div>

        <button
            class="btn btn-primary w-100"
            type="submit">

            Login

        </button>

    </form>

</div>
